services:
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ./config:/config
    # ports:
      # - "9696:9696"
    restart: unless-stopped
    network_mode: "service:gluetun"
    depends_on:
      - gluetun
