services:
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ./config:/config
      - ${MEDIA_PATH}/tv:/tv
      - ${DOWNLOAD_PATH}:/downloads
    ports:
      - "8989:8989"
    restart: unless-stopped
    networks:
      - homelab_network
    depends_on:
      - prowlarr
      - qbittorrent
