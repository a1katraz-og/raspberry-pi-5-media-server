services:
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ./config:/config
      - ${MEDIA_PATH}/TV:/TV
      - ${DOWNLOAD_PATH}:/downloads
    # ports:
      # - "8989:8989"
    restart: unless-stopped
    network_mode: "service:gluetun"
    depends_on:
      - gluetun
