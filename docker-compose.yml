#
#
# This file wires together the shared network and pulls in every
# service definition from ./<service-name>/*.yml using the Compose "include"
# key (requires Docker Compose v2.20+ / `docker compose version`).
name: homelab

networks:
  homelab_network:
    name: homelab_network
    driver: bridge

include:
  - nextcloud/nextcloud.yml
  - nginx-proxy/nginx-proxy.yml
  - gluetun/gluetun.yml
  - qbittorrent/qbittorrent.yml
  - prowlarr/prowlarr.yml
  - sonarr/sonarr.yml
  - radarr/radarr.yml
  - bazarr/bazarr.yml
  - jellyfin/jellyfin.yml
  - jellyseerr/jellyseerr.yml
  - watchtower/watchtower.yml
  - portainer/portainer.yml
  - homarr/homarr.yml
  - traefik/traefik.yml
