services:
  gluetun:
    image: qmcgaw/gluetun:latest
    container_name: gluetun
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - TZ=${TZ}
      - VPN_SERVICE_PROVIDER=${VPN_SERVICE_PROVIDER}
      - VPN_TYPE=${VPN_TYPE}
      - WIREGUARD_PRIVATE_KEY=${WIREGUARD_PRIVATE_KEY}
      - WIREGUARD_ADDRESSES=${WIREGUARD_ADDRESSES}
      - SERVER_COUNTRIES=${SERVER_COUNTRIES}
      - FIREWALL_OUTBOUND_SUBNETS=192.168.0.0/16 # allow LAN access to qBittorrent WebUI
    ports:
      # qBittorrent WebUI + traffic (published here since qbittorrent
      # shares gluetun's network namespace via network_mode)
      - "8080:8080"
      - "6881:6881"
      - "6881:6881/udp"
    volumes:
      - ${CONFIG_PATH}/gluetun:/gluetun
    restart: unless-stopped
    networks:
      - homelab_network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "https://ipinfo.io/ip", "-T", "10"]
      interval: 60s
      timeout: 20s
      retries: 3
      start_period: 30s
